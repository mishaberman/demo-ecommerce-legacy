<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Elevé — Curated Essentials</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Meta Pixel Code — FIRST LOAD -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      
      // No advanced matching in init — uses deprecated setUserProperties later
      fbq('init', '1684145446350033');
      fbq('track', 'PageView');
    </script>

    <!-- DUPLICATE PIXEL LOAD — This loads fbevents.js a SECOND time! -->
    <!-- This is a common legacy mistake that can cause conflicts -->
    <script async src="https://connect.facebook.net/en_US/fbevents.js"></script>

    <!-- Legacy noscript fallback (this part is fine) -->
    <noscript>
      <img height="1" width="1" style="display:none"
        src="https://www.facebook.com/tr?id=1684145446350033&ev=PageView&noscript=1" />
    </noscript>

    <!-- ADDITIONAL legacy tracking pixel via img tag (REDUNDANT — fires PageView twice) -->
    <img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=1684145446350033&ev=PageView&noscript=1" />
    <!-- End Meta Pixel Code -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
